<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface-hover: #22222a;
      --border: #2e2e38;
      --accent: #7c6af7;
      --accent-hover: #9585fa;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --danger: #e05c6a;
      --danger-hover: #f26878;
      --check-bg: #2a2a34;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    header {
      margin-bottom: 32px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .counter {
      margin-top: 6px;
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .counter span {
      color: var(--accent);
      font-weight: 600;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    button.add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    button.add-btn:hover {
      background: var(--accent-hover);
    }

    button.add-btn:active {
      transform: scale(0.97);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: background 0.15s;
      animation: slide-in 0.18s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task:hover {
      background: var(--surface-hover);
    }

    .checkbox-wrap {
      flex-shrink: 0;
      position: relative;
      width: 20px;
      height: 20px;
    }

    .checkbox-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      inset: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .checkbox-wrap .box {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--check-bg);
      pointer-events: none;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .checkbox-wrap input[type="checkbox"]:checked ~ .box {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-wrap .box::after {
      content: "";
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .checkbox-wrap input[type="checkbox"]:checked ~ .box::after {
      opacity: 1;
    }

    .task-text {
      flex: 1;
      font-size: 0.9375rem;
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.2s;
    }

    .task.done .task-text {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    button.delete-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      font-size: 1rem;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button.delete-btn:hover {
      color: var(--danger-hover);
      background: rgba(224, 92, 106, 0.12);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 40px 0;
    }

    @media (max-width: 400px) {
      h1 { font-size: 1.6rem; }
      button.add-btn { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>To Do</h1>
      <p class="counter"><span id="count">0</span> tasks remaining</p>
    </header>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task…" autocomplete="off" />
      <button class="add-btn" id="add-btn">Add</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
  </div>

  <script>
    const input    = document.getElementById('task-input');
    const addBtn   = document.getElementById('add-btn');
    const list     = document.getElementById('task-list');
    const countEl  = document.getElementById('count');

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function updateCounter() {
      const remaining = tasks.filter(t => !t.done).length;
      countEl.textContent = remaining;
    }

    function renderTask(task) {
      const li = document.createElement('li');
      li.className = 'task' + (task.done ? ' done' : '');
      li.dataset.id = task.id;

      const cbWrap = document.createElement('label');
      cbWrap.className = 'checkbox-wrap';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = task.done;
      cb.addEventListener('change', () => toggleTask(task.id));

      const box = document.createElement('span');
      box.className = 'box';

      cbWrap.append(cb, box);

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.title = 'Delete task';
      del.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3 4h10M6 4V3h4v1M5.5 4l.5 9M10.5 4l-.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
      del.addEventListener('click', () => deleteTask(task.id));

      li.append(cbWrap, span, del);
      return li;
    }

    function render() {
      list.innerHTML = '';
      if (tasks.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty-state';
        empty.textContent = 'No tasks yet. Add one above!';
        list.appendChild(empty);
      } else {
        tasks.forEach(task => list.appendChild(renderTask(task)));
      }
      updateCounter();
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggleTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;
      task.done = !task.done;
      save();
      const li = list.querySelector(`[data-id="${id}"]`);
      if (li) li.classList.toggle('done', task.done);
      updateCounter();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    render();
  </script>
</body>
</html>
